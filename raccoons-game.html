<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta http-equiv="X-UA-Compatible" content="IE=edge">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Raccoons Game Hub</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .game { margin: 20px; padding: 10px; border: 1px solid #000; text-align: center; }\n        .search { margin: 20px; }\n    </style>\n</head>\n<body>\n    <h1>Welcome to Raccoons Game Hub!</h1>\n    <input type="text" id="search" class="search" placeholder="Search games...">\n    <div id="games">\n        <div class="game">Retro Bowl</div>\n        <div class="game">Basketball Legends</div>\n        <div class="game">Flappy Bird</div>\n        <div class="game">Pac-Man</div>\n        <div class="game">Snake</div>\n        <div class="game">Tetris</div>\n        <div class="game">Space Invaders</div>\n        <div class="game">FNAF</div>\n        <div class="game">Cookie Clicker</div>\n        <!-- More games go here -->\n    </div>\n    <script>\n        const searchInput = document.getElementById('search');\n        const gamesDiv = document.getElementById('games');\n        const games = Array.from(gamesDiv.children);\n        searchInput.addEventListener('input', () => {\n            const searchTerm = searchInput.value.toLowerCase();\n            games.forEach(game => {\n                const isVisible = game.innerText.toLowerCase().includes(searchTerm);\n                game.style.display = isVisible ? '' : 'none';\n            });\n        });\n    </script>\n</body>\n</html>
